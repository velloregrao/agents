name: Deploy Teams Bot  # updated

on:
  push:
    branches: [main]
    paths:
      - "stock-copilot-agent/**"
      - ".github/workflows/deploy-bot.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: stock-copilot-agent/package-lock.json

      - name: Install dependencies, test, and build TypeScript
        working-directory: stock-copilot-agent
        run: |
          npm ci
          npm test
          npm run build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/bot:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/bot:latest \
            ./stock-copilot-agent
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/bot:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/bot:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name stock-bot \
            --resource-group stock-bot-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/bot:${{ github.sha }} \
            --set-env-vars "DEPLOYED_AT=${{ github.run_id }}"
