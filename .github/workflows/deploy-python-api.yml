name: Deploy Python API

on:
  push:
    branches: [main]
    paths:
      - "stock-analysis-agent/**"
      - "orchestrator/**"
      - "ipo-watch/**"
      - ".github/workflows/deploy-python-api.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run tests
        working-directory: stock-analysis-agent
        run: |
          pip install uv
          uv pip install --system -e ".[test]"
          pytest tests/unit tests/functional -v

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          # Build context is repo root so orchestrator/ (outside stock-analysis-agent/)
          # can be COPY'd into the image alongside the Python package.
          docker build \
            --platform linux/amd64 \
            -f ./stock-analysis-agent/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/python-api:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/python-api:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/python-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/python-api:latest

      - name: Deploy to Azure Container Apps
        run: |
          # Only DEPLOYED_AT is set here — all secrets (ANTHROPIC_API_KEY,
          # ALPACA_API_KEY, ALPACA_API_SECRET) are stored as Container App
          # secrets and referenced via secretRef. They survive image updates
          # and are never overwritten by this workflow.
          az containerapp update \
            --name python-api \
            --resource-group stock-bot-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/python-api:${{ github.sha }} \
            --set-env-vars "DEPLOYED_AT=${{ github.run_id }}"

      - name: Post-deploy health gate
        run: |
          # python-api has internal ingress so we can't curl it from GitHub Actions.
          # Instead we poll until Azure marks the latest revision as ready, which
          # requires the container's startup probe to pass (see TODO below).
          # If the revision never becomes ready within 3 minutes, fail the deploy.
          #
          # TODO: add a startup probe to the Container App definition that calls
          # /health/deep — then "Running" state IS a deep health check.
          REVISION=$(az containerapp show \
            --name python-api \
            --resource-group stock-bot-rg \
            --query properties.latestRevisionName \
            --output tsv)
          echo "Waiting for revision ${REVISION} to become ready..."
          for i in $(seq 1 18); do
            READY=$(az containerapp show \
              --name python-api \
              --resource-group stock-bot-rg \
              --query "properties.latestReadyRevisionName" \
              --output tsv 2>/dev/null)
            echo "  attempt ${i}/18 — ready revision: ${READY}"
            if [ "${READY}" = "${REVISION}" ]; then
              echo "✅ Revision ${REVISION} is ready"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Revision ${REVISION} did not become ready within 3 minutes"
          az containerapp revision show \
            --name python-api \
            --resource-group stock-bot-rg \
            --revision "${REVISION}" \
            --query "{state:properties.runningState,replicas:properties.replicas}" \
            --output json
          exit 1
