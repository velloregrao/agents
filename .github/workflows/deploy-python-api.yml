name: Deploy Python API

on:
  push:
    branches: [main]
    paths:
      - "stock-analysis-agent/**"
      - ".github/workflows/deploy-python-api.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run tests
        working-directory: stock-analysis-agent
        run: |
          pip install uv
          uv pip install --system -e ".[test]"
          pytest tests/unit tests/functional -v

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/python-api:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/python-api:latest \
            ./stock-analysis-agent
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/python-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/python-api:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name python-api \
            --resource-group stock-bot-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/python-api:${{ github.sha }} \
            --set-env-vars "DEPLOYED_AT=${{ github.run_id }}"

      - name: Wait for container to become ready
        run: sleep 30

      - name: Post-deploy deep health check
        run: |
          FQDN=$(az containerapp show \
            --name python-api \
            --resource-group stock-bot-rg \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          URL="https://${FQDN}/health/deep"
          echo "Probing ${URL}"
          STATUS=$(curl -sf -o /tmp/health.json -w "%{http_code}" "${URL}")
          echo "Response: $(cat /tmp/health.json)"
          if [ "${STATUS}" != "200" ]; then
            echo "❌ Deep health check returned ${STATUS} — deploy failed"
            exit 1
          fi
          echo "✅ Deep health check passed"
